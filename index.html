<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="google-site-verification" content="xGSJ0r65XnGqeEU3UjCNEbW9qWihbNIc8Be2SwGh20E" />
    <title>Domu Laura — Casa Vacanze in Sardegna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/6.6.6/css/flag-icons.min.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              serif: ['Cormorant Garamond', 'serif'],
            },
            colors: {
              sardinia: {
                sea:       '#1A4A5C',
                'sea-mid': '#2A7A9A',
                sand:      '#F5EDD8',
                cream:     '#FAF6EE',
                terra:     '#C4622D',
                accent:    '#E8A05A',
                muted:     '#8A7D6A',
                dark:      '#1C1710',
              }
            },
            animation: {
              'fade-in':    'fadeIn 1.4s cubic-bezier(0.16,1,0.3,1) both',
              'fade-in-up': 'fadeInUp 1.4s cubic-bezier(0.16,1,0.3,1) both',
            },
            keyframes: {
              fadeIn:   { '0%': { opacity: '0' },                                '100%': { opacity: '1' } },
              fadeInUp: { '0%': { opacity: '0', transform: 'translateY(32px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            }
          }
        }
      }
    </script>
    <style>
      html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
      body { overflow-x: hidden; touch-action: manipulation; background: #FAF6EE; }
      * { max-width: 100%; }
      html, body, #root { max-width: none; }
      .flag-emoji { font-family: "Apple Color Emoji","Segoe UI Emoji","Segoe UI Symbol","Noto Color Emoji",sans-serif; font-style:normal; font-weight:normal; }
      .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1); }
      .reveal.visible { opacity: 1; transform: none; }
      .reveal-d1 { transition-delay: 0.1s; }
      .reveal-d2 { transition-delay: 0.2s; }
      .reveal-d3 { transition-delay: 0.3s; }
      .reveal-d4 { transition-delay: 0.4s; }
      @keyframes heroPan { 0%{transform:scale(1.08) translateX(0)} 100%{transform:scale(1.08) translateX(-2%)} }
      .hero-pan { animation: heroPan 20s ease-in-out infinite alternate; }
      .img-zoom { overflow: hidden; }
      .img-zoom img { transition: transform 0.7s cubic-bezier(0.16,1,0.3,1); }
      .img-zoom:hover img { transform: scale(1.07); }
      .chat-scroll::-webkit-scrollbar { width: 4px; }
      .chat-scroll::-webkit-scrollbar-track { background: transparent; }
      .chat-scroll::-webkit-scrollbar-thumb { background: rgba(232,160,90,0.3); border-radius: 4px; }
    </style>
    <script>
      // Previene il ripristino automatico della posizione di scroll
      if ('scrollRestoration' in history) {
        history.scrollRestoration = 'manual';
      }
    </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
